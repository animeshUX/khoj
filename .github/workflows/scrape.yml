name: Scrape Craigslist

on:
  schedule:
    # 13:00 UTC = 9am EDT / 8am EST. Adjust if you want a different time.
    - cron: "0 13 * * *"
  workflow_dispatch:    # lets you trigger from the Actions tab on demand

permissions:
  contents: write       # so we can commit docs/ back to main

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Sanity-check Craigslist access
        run: python scraper.py --sanity-check

      - name: Run scraper
        run: python scraper.py --pages-mode --max-listings 100

      - name: Commit updated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily scrape: $(date -u +%Y-%m-%d)"
            git push
          fi
